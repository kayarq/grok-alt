<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grok Trace Viewer</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #21262d;
      --bg4: #30363d;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent2: #1f6feb;
      --green: #3fb950;
      --orange: #d29922;
      --red: #f85149;
      --purple: #a371f7;
      --pink: #db61a2;
      --cyan: #39d2c0;
      --user: #238636;
      --agent: #1f6feb;
      --tool: #9e6a03;
      --phase: #6e7681;
      --perm: #da3633;
      --font: "SF Mono", "Menlo", "Monaco", "Consolas", "Liberation Mono", monospace;
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    header h1 span { color: var(--accent); }

    .header-meta {
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font);
    }

    .tabs {
      display: flex;
      gap: 4px;
      margin-left: auto;
    }

    .tab {
      background: transparent;
      border: 1px solid transparent;
      color: var(--muted);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }

    .tab:hover { color: var(--text); background: var(--bg3); }
    .tab.active {
      color: var(--text);
      background: var(--bg3);
      border-color: var(--border);
    }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      flex: 1;
      min-height: 0;
    }

    .sidebar {
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .sidebar-head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-head input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-family: var(--sans);
    }

    .sidebar-head input:focus {
      outline: none;
      border-color: var(--accent2);
    }

    .session-list {
      overflow-y: auto;
      flex: 1;
    }

    .session-item {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }

    .session-item:hover { background: var(--bg3); }
    .session-item.active {
      background: #1c2d41;
      border-left: 3px solid var(--accent);
      padding-left: 9px;
    }

    .session-item .title {
      font-size: 12.5px;
      font-weight: 500;
      margin-bottom: 4px;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .session-item .meta {
      font-size: 10.5px;
      color: var(--muted);
      font-family: var(--font);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .session-item .cwd {
      font-size: 10px;
      color: var(--muted);
      opacity: 0.8;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 10px;
      background: var(--bg4);
      color: var(--muted);
    }

    .main {
      display: flex;
      flex-direction: column;
      min-height: 0;
      min-width: 0;
    }

    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .toolbar input, .toolbar select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 9px;
      border-radius: 6px;
      font-size: 12px;
    }

    .toolbar input { min-width: 160px; flex: 1; max-width: 320px; }

    .toolbar input:focus, .toolbar select:focus {
      outline: none;
      border-color: var(--accent2);
    }

    .filter-chips {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .chip {
      font-size: 10.5px;
      padding: 4px 9px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }

    .chip.on {
      color: var(--text);
      border-color: transparent;
    }

    .chip.on.cat-turn { background: #1f3d2a; color: var(--green); }
    .chip.on.cat-tool { background: #3d2e00; color: var(--orange); }
    .chip.on.cat-user { background: #1a3d24; color: #56d364; }
    .chip.on.cat-agent { background: #122a4a; color: var(--accent); }
    .chip.on.cat-phase { background: #2d333b; color: var(--muted); }
    .chip.on.cat-permission { background: #3d1214; color: var(--red); }
    .chip.on.cat-stream { background: #2a1f3d; color: var(--purple); }
    .chip.on.cat-meta { background: #1a2f3d; color: var(--cyan); }
    .chip.on.cat-other { background: var(--bg4); }

    .btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 11px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .btn:hover { background: var(--bg4); }
    .btn.primary { background: var(--accent2); border-color: var(--accent2); }
    .btn.primary:hover { filter: brightness(1.1); }

    .content {
      flex: 1;
      overflow: auto;
      padding: 0;
      min-height: 0;
    }

    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      gap: 8px;
      padding: 40px;
      text-align: center;
    }

    .empty h2 { font-size: 16px; color: var(--text); font-weight: 500; }
    .empty p { font-size: 13px; max-width: 420px; line-height: 1.5; }

    /* Timeline */
    .timeline { padding: 8px 0 40px; }

    .tl-item {
      display: grid;
      grid-template-columns: 72px 18px 1fr;
      gap: 0 10px;
      padding: 0 16px;
      position: relative;
    }

    .tl-time {
      font-family: var(--font);
      font-size: 10px;
      color: var(--muted);
      text-align: right;
      padding-top: 10px;
      white-space: nowrap;
    }

    .tl-rail {
      position: relative;
      display: flex;
      justify-content: center;
      padding-top: 12px;
    }

    .tl-rail::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--bg4);
    }

    .tl-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--bg4);
      border: 2px solid var(--bg);
      z-index: 1;
      flex-shrink: 0;
    }

    .tl-item.cat-turn .tl-dot { background: var(--green); }
    .tl-item.cat-tool .tl-dot { background: var(--orange); }
    .tl-item.cat-user .tl-dot { background: #56d364; }
    .tl-item.cat-agent .tl-dot { background: var(--accent); }
    .tl-item.cat-phase .tl-dot { background: var(--phase); }
    .tl-item.cat-permission .tl-dot { background: var(--red); }
    .tl-item.cat-stream .tl-dot { background: var(--purple); }
    .tl-item.cat-meta .tl-dot { background: var(--cyan); }

    .tl-card {
      margin: 4px 0;
      padding: 8px 11px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      min-width: 0;
    }

    .tl-card:hover { border-color: #484f58; }
    .tl-card.open { border-color: var(--accent2); }

    .tl-title {
      font-size: 12.5px;
      line-height: 1.4;
      word-break: break-word;
    }

    .tl-meta {
      display: flex;
      gap: 8px;
      margin-top: 4px;
      font-size: 10px;
      color: var(--muted);
      font-family: var(--font);
    }

    .tl-detail {
      margin-top: 6px;
      font-size: 11.5px;
      color: var(--muted);
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 80px;
      overflow: hidden;
    }

    .tl-card.open .tl-detail { max-height: none; }

    .tl-raw {
      display: none;
      margin-top: 8px;
      padding: 10px;
      background: var(--bg);
      border-radius: 6px;
      font-family: var(--font);
      font-size: 10.5px;
      line-height: 1.45;
      overflow: auto;
      max-height: 400px;
      white-space: pre-wrap;
      word-break: break-word;
      color: #c9d1d9;
    }

    .tl-card.open .tl-raw { display: block; }

    /* Chat */
    .chat { padding: 16px; max-width: 900px; margin: 0 auto; }

    .msg {
      margin-bottom: 14px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .msg-head {
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .msg.user .msg-head { background: #1a3d24; color: #56d364; }
    .msg.assistant .msg-head, .msg.agent .msg-head { background: #122a4a; color: var(--accent); }
    .msg.tool .msg-head { background: #3d2e00; color: var(--orange); }
    .msg.system .msg-head { background: var(--bg3); color: var(--muted); }

    .msg-body {
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--bg2);
    }

    .msg.tool .msg-body {
      font-family: var(--font);
      font-size: 11.5px;
      color: #c9d1d9;
    }

    .msg-status {
      font-size: 10px;
      font-weight: 400;
      opacity: 0.8;
      text-transform: none;
      letter-spacing: 0;
    }

    /* Logs */
    .log-table-wrap { overflow: auto; height: 100%; }

    table.logs {
      width: 100%;
      border-collapse: collapse;
      font-size: 11.5px;
      font-family: var(--font);
    }

    table.logs th {
      position: sticky;
      top: 0;
      background: var(--bg2);
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-weight: 500;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      z-index: 2;
    }

    table.logs td {
      padding: 6px 10px;
      border-bottom: 1px solid #21262d;
      vertical-align: top;
      max-width: 400px;
    }

    table.logs tr:hover td { background: #161b22; }
    table.logs tr.selected td { background: #1c2d41; }

    .log-ts { color: var(--muted); white-space: nowrap; width: 150px; }
    .log-src { color: var(--purple); white-space: nowrap; }
    .log-msg { color: var(--accent); }
    .log-ctx {
      color: var(--muted);
      max-width: 500px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Overview */
    .overview { padding: 20px; max-width: 960px; }

    .ov-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .ov-stat {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }

    .ov-stat .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .ov-stat .value { font-size: 18px; font-weight: 600; margin-top: 4px; font-family: var(--font); }

    .ov-section { margin-bottom: 24px; }
    .ov-section h3 {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 10px;
    }

    .type-bars { display: flex; flex-direction: column; gap: 4px; }

    .type-bar-row {
      display: grid;
      grid-template-columns: 160px 1fr 40px;
      gap: 8px;
      align-items: center;
      font-size: 11px;
      font-family: var(--font);
    }

    .type-bar-row .bar-bg {
      height: 6px;
      background: var(--bg3);
      border-radius: 3px;
      overflow: hidden;
    }

    .type-bar-row .bar-fill {
      height: 100%;
      background: var(--accent2);
      border-radius: 3px;
    }

    .type-bar-row .cnt { color: var(--muted); text-align: right; }

    .file-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .file-chip {
      font-size: 11px;
      font-family: var(--font);
      padding: 4px 8px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
    }

    .status-bar {
      padding: 5px 12px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font);
      flex-shrink: 0;
      display: flex;
      gap: 16px;
    }

    .loading { opacity: 0.5; pointer-events: none; }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }

    /* Hide noisy phase events by default toggle */
    .tl-item.cat-phase.dimmed { opacity: 0.35; }
  </style>
</head>
<body>
  <header>
    <h1><span>Grok</span> Trace Viewer</h1>
    <div class="header-meta" id="headerMeta">loading…</div>
    <div class="tabs">
      <button class="tab active" data-view="timeline">Timeline</button>
      <button class="tab" data-view="chat">Chat</button>
      <button class="tab" data-view="overview">Overview</button>
      <button class="tab" data-view="logs">Unified Log</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-head">
        <input type="search" id="sessionSearch" placeholder="Filter sessions…" />
        <button class="btn" id="refreshSessions" style="width:100%">↻ Refresh</button>
      </div>
      <div class="session-list" id="sessionList">
        <div class="empty"><p>Loading sessions…</p></div>
      </div>
    </aside>

    <main class="main">
      <div class="toolbar" id="toolbarTimeline">
        <input type="search" id="tlFilter" placeholder="Filter timeline (text / tool / kind)…" />
        <div class="filter-chips" id="catChips"></div>
        <label style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;cursor:pointer">
          <input type="checkbox" id="hidePhases" checked /> hide phases
        </label>
        <button class="btn" id="expandAll">Expand</button>
        <button class="btn" id="collapseAll">Collapse</button>
      </div>
      <div class="toolbar hidden" id="toolbarChat">
        <input type="search" id="chatFilter" placeholder="Filter chat…" />
        <label style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;cursor:pointer">
          <input type="checkbox" id="hideTools" /> hide tool noise
        </label>
      </div>
      <div class="toolbar hidden" id="toolbarLogs">
        <input type="search" id="logQ" placeholder="Full-text search…" />
        <input type="search" id="logMsg" placeholder="msg contains…" style="max-width:160px" />
        <input type="search" id="logSrc" placeholder="src…" style="max-width:100px" />
        <input type="search" id="logSid" placeholder="session id…" style="max-width:200px" />
        <button class="btn primary" id="logSearch">Search</button>
        <button class="btn" id="logStats">Stats</button>
      </div>
      <div class="toolbar hidden" id="toolbarOverview">
        <span style="font-size:12px;color:var(--muted)" id="ovTitle">Select a session</span>
      </div>

      <div class="content" id="content">
        <div class="empty">
          <h2>Select a session</h2>
          <p>Browse Grok sessions on the left. Timeline shows events &amp; updates; Chat reconstructs the conversation; Unified Log searches <code>~/.grok/logs/unified.jsonl</code>.</p>
        </div>
      </div>

      <div class="status-bar" id="statusBar">Ready</div>
    </main>
  </div>

  <script>
    const state = {
      sessions: [],
      selected: null,
      view: "timeline",
      timeline: [],
      chat: [],
      overview: null,
      categories: new Set(["turn", "tool", "user", "agent", "permission", "stream", "meta", "other"]),
      allCategories: ["turn", "tool", "user", "agent", "phase", "permission", "stream", "meta", "other"],
    };

    const $ = (sel) => document.querySelector(sel);
    const $$ = (sel) => [...document.querySelectorAll(sel)];

    async function api(path) {
      const r = await fetch(path);
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        throw new Error(err.error || r.statusText);
      }
      return r.json();
    }

    function setStatus(msg) {
      $("#statusBar").textContent = msg;
    }

    function fmtTime(ts) {
      if (!ts) return "—";
      try {
        const d = new Date(ts);
        if (isNaN(d)) return String(ts).slice(11, 19) || String(ts).slice(0, 19);
        return d.toLocaleTimeString([], { hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit" });
      } catch { return "—"; }
    }

    function fmtDate(ts) {
      if (!ts) return "";
      try {
        const d = new Date(ts);
        if (isNaN(d)) return String(ts).slice(0, 10);
        return d.toLocaleDateString([], { month: "short", day: "numeric" }) + " " +
          d.toLocaleTimeString([], { hour12: false, hour: "2-digit", minute: "2-digit" });
      } catch { return ""; }
    }

    function escapeHtml(s) {
      return String(s ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function previewJson(obj, max = 2000) {
      try {
        const s = JSON.stringify(obj, null, 2);
        return s.length > max ? s.slice(0, max) + "\n…" : s;
      } catch { return String(obj); }
    }

    /* ── Sessions ── */
    async function loadSessions() {
      setStatus("Loading sessions…");
      try {
        const data = await api("/api/sessions");
        state.sessions = data.sessions || [];
        renderSessionList();
        setStatus(`${state.sessions.length} sessions`);
      } catch (e) {
        $("#sessionList").innerHTML = `<div class="empty"><p>Error: ${escapeHtml(e.message)}</p></div>`;
        setStatus("Error loading sessions");
      }
    }

    function renderSessionList() {
      const q = ($("#sessionSearch").value || "").toLowerCase();
      const filtered = state.sessions.filter(s => {
        if (!q) return true;
        return [s.title, s.cwd, s.id, s.model, s.summary].join(" ").toLowerCase().includes(q);
      });

      if (!filtered.length) {
        $("#sessionList").innerHTML = `<div class="empty"><p>No sessions match</p></div>`;
        return;
      }

      $("#sessionList").innerHTML = filtered.map(s => `
        <div class="session-item ${state.selected?.id === s.id ? "active" : ""}"
             data-id="${escapeHtml(s.id)}" data-cwd-key="${escapeHtml(s.cwd_key)}">
          <div class="title">${escapeHtml(s.title)}</div>
          <div class="meta">
            <span>${fmtDate(s.updated_at || s.created_at)}</span>
            ${s.model ? `<span class="badge">${escapeHtml(s.model)}</span>` : ""}
            ${s.events_count ? `<span>${s.events_count} ev</span>` : ""}
            ${s.updates_count ? `<span>${s.updates_count} upd</span>` : ""}
          </div>
          <div class="cwd" title="${escapeHtml(s.cwd)}">${escapeHtml(s.cwd)}</div>
        </div>
      `).join("");

      $$(".session-item").forEach(el => {
        el.addEventListener("click", () => selectSession(el.dataset.id, el.dataset.cwdKey));
      });
    }

    async function selectSession(id, cwdKey) {
      state.selected = state.sessions.find(s => s.id === id) || { id, cwd_key: cwdKey };
      renderSessionList();
      $("#logSid").value = id;
      await loadView();
    }

    /* ── Views ── */
    function setView(view) {
      state.view = view;
      $$(".tab").forEach(t => t.classList.toggle("active", t.dataset.view === view));
      $("#toolbarTimeline").classList.toggle("hidden", view !== "timeline");
      $("#toolbarChat").classList.toggle("hidden", view !== "chat");
      $("#toolbarLogs").classList.toggle("hidden", view !== "logs");
      $("#toolbarOverview").classList.toggle("hidden", view !== "overview");
      loadView();
    }

    async function loadView() {
      if (state.view === "logs") {
        return searchLogs();
      }
      if (!state.selected) {
        $("#content").innerHTML = `<div class="empty"><h2>Select a session</h2><p>Pick a session from the sidebar to inspect traces.</p></div>`;
        return;
      }
      const { id, cwd_key } = state.selected;
      const q = `cwd_key=${encodeURIComponent(cwd_key || "")}`;
      $("#content").classList.add("loading");
      setStatus(`Loading ${state.view}…`);

      try {
        if (state.view === "timeline") {
          const data = await api(`/api/session/${id}/timeline?${q}&limit=8000`);
          state.timeline = data.timeline || [];
          renderTimeline();
          setStatus(`Timeline · ${state.timeline.length} items · ${id.slice(0, 8)}…`);
        } else if (state.view === "chat") {
          const data = await api(`/api/session/${id}/chat?${q}&limit=5000`);
          state.chat = data.messages || [];
          renderChat();
          setStatus(`Chat · ${state.chat.length} blocks · ${id.slice(0, 8)}…`);
        } else if (state.view === "overview") {
          const data = await api(`/api/session/${id}/overview?${q}`);
          state.overview = data;
          renderOverview();
          setStatus(`Overview · ${id}`);
        }
      } catch (e) {
        $("#content").innerHTML = `<div class="empty"><h2>Error</h2><p>${escapeHtml(e.message)}</p></div>`;
        setStatus("Error: " + e.message);
      } finally {
        $("#content").classList.remove("loading");
      }
    }

    /* ── Timeline ── */
    function buildCatChips() {
      const labels = {
        turn: "turn", tool: "tool", user: "user", agent: "agent",
        phase: "phase", permission: "perm", stream: "stream", meta: "meta", other: "other",
      };
      $("#catChips").innerHTML = state.allCategories.map(c => `
        <button class="chip cat-${c} ${state.categories.has(c) ? "on" : ""}" data-cat="${c}">${labels[c]}</button>
      `).join("");
      $$("#catChips .chip").forEach(btn => {
        btn.addEventListener("click", () => {
          const c = btn.dataset.cat;
          if (state.categories.has(c)) state.categories.delete(c);
          else state.categories.add(c);
          btn.classList.toggle("on", state.categories.has(c));
          renderTimeline();
        });
      });
    }

    function renderTimeline() {
      const filter = ($("#tlFilter").value || "").toLowerCase();
      const hidePhases = $("#hidePhases").checked;

      let items = state.timeline.filter(it => {
        if (!state.categories.has(it.category)) return false;
        if (hidePhases && it.category === "phase") return false;
        if (!filter) return true;
        const blob = [it.title, it.detail, it.kind, it.category].join(" ").toLowerCase();
        return blob.includes(filter);
      });

      if (!items.length) {
        $("#content").innerHTML = `<div class="empty"><h2>No timeline items</h2><p>Try adjusting filters or pick another session.</p></div>`;
        return;
      }

      $("#content").innerHTML = `<div class="timeline">${items.map((it, i) => `
        <div class="tl-item cat-${escapeHtml(it.category)}" data-idx="${i}">
          <div class="tl-time">${fmtTime(it.ts)}</div>
          <div class="tl-rail"><div class="tl-dot"></div></div>
          <div class="tl-card" data-i="${i}">
            <div class="tl-title">${escapeHtml(it.title)}</div>
            <div class="tl-meta">
              <span>${escapeHtml(it.source)}</span>
              <span>${escapeHtml(it.kind)}</span>
              <span class="badge">${escapeHtml(it.category)}</span>
            </div>
            ${it.detail ? `<div class="tl-detail">${escapeHtml(it.detail)}</div>` : ""}
            <pre class="tl-raw">${escapeHtml(previewJson(it.raw))}</pre>
          </div>
        </div>
      `).join("")}</div>`;

      $$(".tl-card").forEach(card => {
        card.addEventListener("click", (e) => {
          if (e.target.closest(".tl-raw")) return;
          card.classList.toggle("open");
        });
      });
    }

    /* ── Chat ── */
    function renderChat() {
      const filter = ($("#chatFilter").value || "").toLowerCase();
      const hideTools = $("#hideTools").checked;

      let msgs = state.chat.filter(m => {
        if (hideTools && m.role === "tool") return false;
        if (!filter) return true;
        const blob = [m.role, m.text, m.title, m.tool_name, m.status,
          typeof m.content === "string" ? m.content : JSON.stringify(m.content || "")].join(" ").toLowerCase();
        return blob.includes(filter);
      });

      if (!msgs.length) {
        $("#content").innerHTML = `<div class="empty"><h2>No chat content</h2><p>This session may only have internal events.</p></div>`;
        return;
      }

      $("#content").innerHTML = `<div class="chat">${msgs.map(m => {
        const role = m.role === "agent" ? "assistant" : m.role;
        let body = "";
        if (m.role === "tool") {
          const c = m.content;
          body = typeof c === "string" ? c : previewJson(c || {}, 3000);
        } else {
          body = m.text || "";
        }
        const label = m.role === "tool"
          ? `${m.kind === "update" ? "tool result" : "tool call"} · ${m.title || m.tool_name || ""}`
          : m.role;
        const status = m.status ? `<span class="msg-status">${escapeHtml(m.status)}</span>` : "";
        return `
          <div class="msg ${escapeHtml(role)}">
            <div class="msg-head"><span>${escapeHtml(label)}</span>${status}</div>
            <div class="msg-body">${escapeHtml(body)}</div>
          </div>`;
      }).join("")}</div>`;
    }

    /* ── Overview ── */
    function renderOverview() {
      const ov = state.overview;
      if (!ov) return;
      const s = ov.summary || {};
      const sig = ov.signals || {};
      $("#ovTitle").textContent = s.generated_title || s.session_summary || state.selected?.id || "";

      const maxEv = Math.max(1, ...Object.values(ov.event_types || {}));
      const maxUp = Math.max(1, ...Object.values(ov.update_types || {}));

      $("#content").innerHTML = `
        <div class="overview">
          <div class="ov-grid">
            <div class="ov-stat"><div class="label">Model</div><div class="value" style="font-size:13px">${escapeHtml(s.current_model_id || "—")}</div></div>
            <div class="ov-stat"><div class="label">Messages</div><div class="value">${s.num_messages ?? "—"}</div></div>
            <div class="ov-stat"><div class="label">Chat msgs</div><div class="value">${s.num_chat_messages ?? "—"}</div></div>
            <div class="ov-stat"><div class="label">Agent</div><div class="value" style="font-size:12px">${escapeHtml(s.agent_name || "—")}</div></div>
            <div class="ov-stat"><div class="label">Tokens</div><div class="value">${sig.total_tokens ?? "—"}</div></div>
            <div class="ov-stat"><div class="label">Tool calls</div><div class="value">${sig.tool_calls ?? "—"}</div></div>
          </div>

          <div class="ov-section">
            <h3>Session info</h3>
            <div style="font-size:12px;color:var(--muted);font-family:var(--font);line-height:1.8">
              <div><b style="color:var(--text)">ID:</b> ${escapeHtml(s.info?.id || state.selected?.id || "")}</div>
              <div><b style="color:var(--text)">CWD:</b> ${escapeHtml(s.info?.cwd || state.selected?.cwd || "")}</div>
              <div><b style="color:var(--text)">Created:</b> ${escapeHtml(s.created_at || "")}</div>
              <div><b style="color:var(--text)">Updated:</b> ${escapeHtml(s.updated_at || s.last_active_at || "")}</div>
              <div><b style="color:var(--text)">Path:</b> ${escapeHtml(ov.path || "")}</div>
            </div>
          </div>

          <div class="ov-section">
            <h3>Event types (events.jsonl)</h3>
            <div class="type-bars">${Object.entries(ov.event_types || {}).map(([k, v]) => `
              <div class="type-bar-row">
                <span>${escapeHtml(k)}</span>
                <div class="bar-bg"><div class="bar-fill" style="width:${(v / maxEv) * 100}%"></div></div>
                <span class="cnt">${v}</span>
              </div>`).join("") || "<span style='color:var(--muted);font-size:12px'>none</span>"}</div>
          </div>

          <div class="ov-section">
            <h3>Update types (updates.jsonl)</h3>
            <div class="type-bars">${Object.entries(ov.update_types || {}).map(([k, v]) => `
              <div class="type-bar-row">
                <span>${escapeHtml(k)}</span>
                <div class="bar-bg"><div class="bar-fill" style="width:${(v / maxUp) * 100}%"></div></div>
                <span class="cnt">${v}</span>
              </div>`).join("") || "<span style='color:var(--muted);font-size:12px'>none</span>"}</div>
          </div>

          <div class="ov-section">
            <h3>Files in session dir</h3>
            <div class="file-list">${(ov.files || []).map(f => `<span class="file-chip">${escapeHtml(f)}</span>`).join("")}
            ${(ov.dirs || []).map(d => `<span class="file-chip" style="color:var(--accent)">📁 ${escapeHtml(d)}/</span>`).join("")}</div>
          </div>
        </div>`;
    }

    /* ── Logs ── */
    async function searchLogs() {
      $("#content").classList.add("loading");
      setStatus("Searching unified log…");
      const params = new URLSearchParams({
        q: $("#logQ").value || "",
        msg: $("#logMsg").value || "",
        src: $("#logSrc").value || "",
        sid: $("#logSid").value || "",
        limit: "400",
      });
      try {
        const data = await api("/api/logs/unified?" + params);
        renderLogs(data);
        setStatus(`Log · ${data.returned} results · scanned ${data.total_scanned} lines · ${(data.file_size / 1024).toFixed(0)} KB`);
      } catch (e) {
        $("#content").innerHTML = `<div class="empty"><h2>Error</h2><p>${escapeHtml(e.message)}</p></div>`;
      } finally {
        $("#content").classList.remove("loading");
      }
    }

    function renderLogs(data) {
      if (!data.exists) {
        $("#content").innerHTML = `<div class="empty"><h2>No unified log</h2><p>Expected at ${escapeHtml(data.path)}</p></div>`;
        return;
      }
      const entries = data.entries || [];
      if (!entries.length) {
        $("#content").innerHTML = `<div class="empty"><h2>No matches</h2><p>Try broader filters or clear search.</p></div>`;
        return;
      }
      $("#content").innerHTML = `
        <div class="log-table-wrap">
          <table class="logs">
            <thead><tr><th>Time</th><th>Src</th><th>Msg</th><th>Sid</th><th>Context</th></tr></thead>
            <tbody>${entries.map((e, i) => {
              const ctx = e.ctx ? JSON.stringify(e.ctx) : (e._raw || "");
              return `<tr data-i="${i}">
                <td class="log-ts">${escapeHtml(fmtTime(e.ts) || (e.ts || "").slice(11, 23))}</td>
                <td class="log-src">${escapeHtml(e.src || "")}</td>
                <td class="log-msg">${escapeHtml(e.msg || "")}</td>
                <td style="font-size:10px;color:var(--muted)">${escapeHtml((e.sid || "").slice(0, 8))}</td>
                <td class="log-ctx" title="${escapeHtml(ctx)}">${escapeHtml(ctx.slice(0, 120))}</td>
              </tr>`;
            }).join("")}</tbody>
          </table>
        </div>`;

      // click row → show full json in a simple way
      $$("table.logs tbody tr").forEach(tr => {
        tr.addEventListener("click", () => {
          $$("table.logs tbody tr").forEach(r => r.classList.remove("selected"));
          tr.classList.add("selected");
          const i = +tr.dataset.i;
          const e = entries[i];
          const pre = document.createElement("pre");
          pre.className = "tl-raw";
          pre.style.cssText = "display:block;margin:12px;max-height:50vh";
          pre.textContent = previewJson(e, 8000);
          // show in status / replace detail area — append below table temporarily
          let detail = $("#logDetail");
          if (!detail) {
            detail = document.createElement("div");
            detail.id = "logDetail";
            $("#content").appendChild(detail);
          }
          detail.innerHTML = "";
          detail.appendChild(pre);
        });
      });
    }

    async function showLogStats() {
      setStatus("Loading log stats…");
      try {
        const data = await api("/api/logs/stats");
        $("#content").innerHTML = `
          <div class="overview">
            <div class="ov-section"><h3>Unified log</h3>
              <div style="font-size:12px;font-family:var(--font);color:var(--muted);line-height:1.8">
                <div>${escapeHtml(data.path)}</div>
                <div>Size: ${data.size ? (data.size / 1024).toFixed(1) + " KB" : "—"} · Scanned: ${data.scanned ?? "—"} lines</div>
              </div>
            </div>
            <div class="ov-section"><h3>Top message types</h3>
              <div class="type-bars">${(data.top_msgs || []).map(([k, v]) => {
                const max = data.top_msgs[0][1];
                return `<div class="type-bar-row"><span title="${escapeHtml(k)}">${escapeHtml(k.slice(0, 28))}</span>
                  <div class="bar-bg"><div class="bar-fill" style="width:${(v/max)*100}%"></div></div>
                  <span class="cnt">${v}</span></div>`;
              }).join("")}</div>
            </div>
            <div class="ov-section"><h3>Sources</h3>
              <div class="type-bars">${(data.top_srcs || []).map(([k, v]) => {
                const max = data.top_srcs[0][1];
                return `<div class="type-bar-row"><span>${escapeHtml(k)}</span>
                  <div class="bar-bg"><div class="bar-fill" style="width:${(v/max)*100}%"></div></div>
                  <span class="cnt">${v}</span></div>`;
              }).join("")}</div>
            </div>
          </div>`;
        setStatus("Log stats loaded");
      } catch (e) {
        setStatus("Error: " + e.message);
      }
    }

    /* ── Init ── */
    async function init() {
      buildCatChips();
      try {
        const health = await api("/api/health");
        $("#headerMeta").textContent = `${health.grok_home} · sessions ${health.sessions_exist ? "✓" : "✗"} · log ${health.unified_log_exists ? "✓" : "✗"}`;
      } catch {
        $("#headerMeta").textContent = "server offline?";
      }

      $$(".tab").forEach(t => t.addEventListener("click", () => setView(t.dataset.view)));
      $("#sessionSearch").addEventListener("input", renderSessionList);
      $("#refreshSessions").addEventListener("click", loadSessions);
      $("#tlFilter").addEventListener("input", () => { if (state.view === "timeline") renderTimeline(); });
      $("#hidePhases").addEventListener("change", () => { if (state.view === "timeline") renderTimeline(); });
      $("#chatFilter").addEventListener("input", () => { if (state.view === "chat") renderChat(); });
      $("#hideTools").addEventListener("change", () => { if (state.view === "chat") renderChat(); });
      $("#logSearch").addEventListener("click", searchLogs);
      $("#logStats").addEventListener("click", showLogStats);
      ["logQ", "logMsg", "logSrc", "logSid"].forEach(id => {
        $("#" + id).addEventListener("keydown", e => { if (e.key === "Enter") searchLogs(); });
      });
      $("#expandAll").addEventListener("click", () => $$(".tl-card").forEach(c => c.classList.add("open")));
      $("#collapseAll").addEventListener("click", () => $$(".tl-card").forEach(c => c.classList.remove("open")));

      await loadSessions();
    }

    init();
  </script>
</body>
</html>
